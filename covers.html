<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>alimentary canon — covers</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', 'Hiragino Mincho ProN', serif;
      background: #f9f6f1;
      color: #2a2a2a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      max-width: 960px;
      margin: 0 auto 2rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: normal;
      letter-spacing: 0.05em;
      color: #1a1a1a;
    }

    h1 span {
      display: block;
      font-size: 0.85rem;
      color: #888;
      margin-top: 0.3rem;
      letter-spacing: 0.1em;
      font-family: 'Helvetica Neue', sans-serif;
    }

    .view-switch {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 0.8rem;
      color: #888;
    }

    .view-switch a {
      color: #555;
      text-decoration: none;
      border-bottom: 1px solid #ccc;
    }

    .view-switch a:hover { color: #1a1a1a; border-color: #1a1a1a; }

    .controls {
      max-width: 960px;
      margin: 0 auto 1.5rem;
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    input[type="search"] {
      padding: 0.5rem 0.8rem;
      border: 1px solid #ccc;
      background: #fff;
      font-size: 0.9rem;
      font-family: inherit;
      width: 280px;
      outline: none;
      border-radius: 2px;
    }

    input[type="search"]:focus { border-color: #888; }

    #count {
      font-size: 0.85rem;
      color: #888;
      font-family: 'Helvetica Neue', sans-serif;
      margin-left: auto;
    }

    .grid {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 1rem;
    }

    .book-card {
      position: relative;
    }

    .book-card:hover .tooltip {
      opacity: 1;
      pointer-events: auto;
    }

    .cover-wrap {
      width: 100%;
      aspect-ratio: 2 / 3;
      background: #e8e4de;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.2s;
    }

    .no-cover {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
      text-align: center;
      font-size: 0.68rem;
      color: #999;
      line-height: 1.4;
    }

    .tooltip {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26, 26, 26, 0.94);
      color: #f9f6f1;
      padding: 0.5rem 0.7rem;
      font-size: 0.78rem;
      line-height: 1.5;
      width: max-content;
      max-width: 220px;
      border-radius: 2px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 10;
      font-family: 'Helvetica Neue', 'Hiragino Kaku Gothic ProN', sans-serif;
    }

    .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: rgba(26, 26, 26, 0.94);
    }

    .tooltip .t-title { font-weight: bold; margin-bottom: 0.2rem; }
    .tooltip .t-meta  { color: #bbb; font-size: 0.73rem; }

    footer {
      max-width: 960px;
      margin: 3rem auto 0;
      font-size: 0.8rem;
      color: #aaa;
      font-family: 'Helvetica Neue', sans-serif;
    }
  </style>
</head>
<body>
  <header>
    <h1>alimentary canon<span>the books that made me</span></h1>
    <div class="view-switch">→ <a href="index.html">リスト表示</a></div>
  </header>

  <div class="controls">
    <input type="search" id="search" placeholder="タイトル・著者・出版社で絞り込む">
    <span id="count"></span>
  </div>

  <div class="grid" id="grid"></div>

  <footer id="footer"></footer>

  <script>
    let allBooks = [];

    async function loadCSV() {
      const res = await fetch('bookshelf.csv');
      const text = await res.text();
      allBooks = parseCSV(text);
      render(allBooks);
      document.getElementById('footer').textContent =
        `alimentary canon — ${allBooks.length} books`;
    }

    function parseCSV(text) {
      const rows = [];
      for (const line of text.split('\n')) {
        if (line.trim()) rows.push(parseCSVLine(line));
      }
      return rows;
    }

    function parseCSVLine(line) {
      const cols = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') {
          if (inQ && line[i+1] === '"') { cur += '"'; i++; }
          else inQ = !inQ;
        } else if (c === ',' && !inQ) {
          cols.push(cur); cur = '';
        } else {
          cur += c;
        }
      }
      cols.push(cur);
      return cols;
    }

    function esc(s) {
      return (s || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function render(books) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      books.forEach(cols => {
        const title  = cols[0] || '';
        const vol    = cols[1] || '';
        const author = (cols[2] || '').replace(/,\s*\d{4}-?\s*$/, '').replace(/^"|"$/g, '');
        const pub    = cols[3] || '';
        const year   = (cols[5] || '').replace(/\.\d+$/, '');
        const isbn   = (cols[6] || '').trim();

        const displayTitle = vol ? `${title} ${vol}巻` : title;

        const card = document.createElement('div');
        card.className = 'book-card';

        const coverInner = isbn
          ? `<img src="https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg?default=false"
               alt="${esc(displayTitle)}" loading="lazy"
               onerror="this.parentNode.innerHTML='<div class=\\"no-cover\\">${esc(displayTitle).replace(/'/g, '&#39;')}</div>'">`
          : `<div class="no-cover">${esc(displayTitle)}</div>`;

        card.innerHTML = `
          <div class="cover-wrap">${coverInner}</div>
          <div class="tooltip">
            <div class="t-title">${esc(displayTitle)}</div>
            <div class="t-meta">${esc(author)}<br>${esc(pub)}${year ? '&ensp;' + esc(year) : ''}</div>
          </div>`;

        grid.appendChild(card);
      });

      document.getElementById('count').textContent = `${books.length} 冊`;
    }

    document.getElementById('search').addEventListener('input', function() {
      const q = this.value.toLowerCase();
      if (!q) { render(allBooks); return; }
      render(allBooks.filter(cols =>
        (cols[0]||'').toLowerCase().includes(q) ||
        (cols[2]||'').toLowerCase().includes(q) ||
        (cols[3]||'').toLowerCase().includes(q)
      ));
    });

    loadCSV();
  </script>
</body>
</html>
