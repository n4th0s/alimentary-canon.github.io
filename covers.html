<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>alimentary canon — covers</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', 'Hiragino Mincho ProN', serif;
      background: #f9f6f1;
      color: #2a2a2a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      max-width: 960px;
      margin: 0 auto 2rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: normal;
      letter-spacing: 0.05em;
      color: #1a1a1a;
    }

    h1 span {
      display: block;
      font-size: 0.85rem;
      color: #888;
      margin-top: 0.3rem;
      letter-spacing: 0.1em;
      font-family: 'Helvetica Neue', sans-serif;
    }

    .view-switch {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 0.8rem;
      color: #888;
    }

    .view-switch a {
      color: #555;
      text-decoration: none;
      border-bottom: 1px solid #ccc;
    }

    .view-switch a:hover { color: #1a1a1a; border-color: #1a1a1a; }

    .controls {
      max-width: 960px;
      margin: 0 auto 1.5rem;
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    input[type="search"] {
      padding: 0.5rem 0.8rem;
      border: 1px solid #ccc;
      background: #fff;
      font-size: 0.9rem;
      font-family: inherit;
      width: 280px;
      outline: none;
      border-radius: 2px;
    }

    input[type="search"]:focus { border-color: #888; }

    #count {
      font-size: 0.85rem;
      color: #888;
      font-family: 'Helvetica Neue', sans-serif;
      margin-left: auto;
    }

    .grid {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 1rem;
    }

    .book-card {
      position: relative;
    }

    .book-card:hover .tooltip {
      opacity: 1;
    }

    .cover-wrap {
      width: 100%;
      aspect-ratio: 2 / 3;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 2px 3px 8px rgba(0,0,0,0.15);
    }

    .cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .no-cover {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.6rem 0.5rem;
      text-align: center;
      font-size: 0.7rem;
      color: rgba(0,0,0,0.55);
      line-height: 1.4;
      overflow: hidden;
    }

    .no-cover .nc-title {
      font-size: 0.72rem;
      line-height: 1.4;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
    }

    .no-cover .nc-author {
      font-size: 0.62rem;
      margin-top: 0.4rem;
      opacity: 0.6;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      width: 100%;
    }

    .tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26, 26, 26, 0.94);
      color: #f9f6f1;
      padding: 0.5rem 0.7rem;
      font-size: 0.78rem;
      line-height: 1.5;
      width: max-content;
      max-width: 220px;
      border-radius: 2px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 100;
      font-family: 'Helvetica Neue', 'Hiragino Kaku Gothic ProN', sans-serif;
      white-space: normal;
    }

    .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: rgba(26, 26, 26, 0.94);
    }

    .tooltip .t-title { font-weight: bold; margin-bottom: 0.2rem; }
    .tooltip .t-meta  { color: #bbb; font-size: 0.73rem; }

    footer {
      max-width: 960px;
      margin: 3rem auto 0;
      font-size: 0.8rem;
      color: #aaa;
      font-family: 'Helvetica Neue', sans-serif;
    }
  </style>
</head>
<body>
  <header>
    <h1>alimentary canon<span>the books that made me</span></h1>
    <div class="view-switch">→ <a href="index.html">リスト表示</a></div>
  </header>

  <div class="controls">
    <input type="search" id="search" placeholder="タイトル・著者・出版社で絞り込む">
    <span id="count"></span>
  </div>

  <div class="grid" id="grid"></div>

  <footer id="footer"></footer>

  <script>
    let allBooks = [];
    let coverMap = {};

    const NO_COVER_COLORS = [
      '#d4c5b0', '#b8c4d0', '#c5b8d0', '#cfd4b8', '#b8d0c5',
      '#d0bfb8', '#c4c0b8', '#b8c8d0', '#d0c8b8', '#bfc5d0'
    ];

    function cardColor(title) {
      let h = 0;
      for (const c of (title || '')) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
      return NO_COVER_COLORS[h % NO_COVER_COLORS.length];
    }

    async function fetchOpenBD(isbns) {
      if (!isbns.length) return {};
      try {
        const res = await fetch(
          `https://api.openbd.jp/v1/get?isbn=${isbns.join(',')}&fields=summary`
        );
        const data = await res.json();
        const map = {};
        data.forEach((item, i) => {
          if (item && item.summary && item.summary.cover) {
            map[isbns[i]] = item.summary.cover;
          }
        });
        return map;
      } catch {
        return {};
      }
    }

    async function loadCSV() {
      const res = await fetch('bookshelf.csv');
      const text = await res.text();
      allBooks = parseCSV(text);

      const isbns = allBooks.map(cols => (cols[6] || '').trim()).filter(Boolean);
      coverMap = await fetchOpenBD(isbns);

      render(allBooks);
      document.getElementById('footer').textContent =
        `alimentary canon — ${allBooks.length} books`;
    }

    function parseCSV(text) {
      const rows = [];
      for (const line of text.split('\n')) {
        if (line.trim()) rows.push(parseCSVLine(line));
      }
      return rows;
    }

    function parseCSVLine(line) {
      const cols = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') {
          if (inQ && line[i+1] === '"') { cur += '"'; i++; }
          else inQ = !inQ;
        } else if (c === ',' && !inQ) {
          cols.push(cur); cur = '';
        } else {
          cur += c;
        }
      }
      cols.push(cur);
      return cols;
    }

    function esc(s) {
      return (s || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function createCard(cols) {
      const title  = cols[0] || '';
      const vol    = cols[1] || '';
      const author = (cols[2] || '')
        .replace(/,\s*\d{4}-?\s*$/, '').replace(/^"|"$/g, '');
      const pub    = cols[3] || '';
      const year   = (cols[5] || '').replace(/\.\d+$/, '');
      const isbn   = (cols[6] || '').trim();
      const displayTitle = vol ? `${title} ${vol}巻` : title;
      const coverUrl = isbn ? coverMap[isbn] : null;

      const card = document.createElement('div');
      card.className = 'book-card';

      const wrap = document.createElement('div');
      wrap.className = 'cover-wrap';

      if (coverUrl) {
        const img = document.createElement('img');
        img.alt = displayTitle;
        img.loading = 'lazy';
        img.src = coverUrl;
        img.onerror = () => wrap.replaceChild(makeNoCover(title, vol, author), img);
        wrap.appendChild(img);
      } else {
        wrap.appendChild(makeNoCover(title, vol, author));
      }

      const tooltip = document.createElement('div');
      tooltip.className = 'tooltip';
      tooltip.innerHTML =
        `<div class="t-title">${esc(displayTitle)}</div>` +
        `<div class="t-meta">${esc(author)}<br>${esc(pub)}${year ? ' ' + esc(year) : ''}</div>`;

      card.appendChild(wrap);
      card.appendChild(tooltip);
      return card;
    }

    function makeNoCover(title, vol, author) {
      const displayTitle = vol ? `${title} ${vol}巻` : title;
      const div = document.createElement('div');
      div.className = 'no-cover';
      div.style.background = cardColor(title);

      const t = document.createElement('div');
      t.className = 'nc-title';
      t.textContent = displayTitle;

      const a = document.createElement('div');
      a.className = 'nc-author';
      a.textContent = author.replace(/,\s*\d{4}-?\s*$/, '').replace(/^"|"$/g, '');

      div.appendChild(t);
      if (author) div.appendChild(a);
      return div;
    }

    function render(books) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      books.forEach(cols => grid.appendChild(createCard(cols)));
      document.getElementById('count').textContent = `${books.length} 冊`;
    }

    document.getElementById('search').addEventListener('input', function() {
      const q = this.value.toLowerCase();
      if (!q) { render(allBooks); return; }
      render(allBooks.filter(cols =>
        (cols[0]||'').toLowerCase().includes(q) ||
        (cols[2]||'').toLowerCase().includes(q) ||
        (cols[3]||'').toLowerCase().includes(q)
      ));
    });

    loadCSV();
  </script>
</body>
</html>
